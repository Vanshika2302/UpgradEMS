<div class="container mt-5">

  <h1 class="mb-4">
    Manage Sessions
  </h1>

  <!-- CREATE SESSION -->

  <div class="card p-4 shadow mb-5">

    <input
      type="text"
      class="form-control mb-3"
      placeholder="Session Title"
      [(ngModel)]="session.title"
    >

    <textarea
      class="form-control mb-3"
      placeholder="Description"
      [(ngModel)]="session.description"
    ></textarea>

    <input
      type="time"
      class="form-control mb-3"
      [(ngModel)]="session.startTime"
    >

    <button
      class="btn btn-primary"
      (click)="createSession()"
    >
      Add Session
    </button>

  </div>

  <!-- SESSION LIST -->

  <div class="row">

    <div
      class="col-md-4 mb-4"
      *ngFor="let item of sessions"
    >

      <div class="card p-3 shadow">

        <h3>{{ item.title }}</h3>

        <p>{{ item.description }}</p>

        <p>
          {{ item.startTime }}
        </p>

        <button
          class="btn btn-danger"
          (click)="deleteSession(item.sessionId)"
        >
          Delete
        </button>

      </div>

    </div>

  </div>

</div>
